<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aetheris — Competitive Programming</title>
    <meta name="description" content="Олимпиадная платформа нового поколения с AI наставником, дуэлями и контестами." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <script>
      (function(){
        try{
          var s=JSON.parse(localStorage.getItem('aetheris-theme')||'{}');
          var t=(s&&s.state&&s.state.theme)||'dark';
          document.documentElement.classList.add(t==='dark'?'dark':'light');
        }catch(e){
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
